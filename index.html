<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💃 K-Dance Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF2D78;
    --purple: #7B2FFF;
    --cyan: #00F5FF;
    --dark: #0A0010;
    --card: #12001E;
    --glow-pink: 0 0 30px #FF2D7888;
    --glow-cyan: 0 0 30px #00F5FF88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: white;
    font-family: 'Noto Kufi Arabic', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 50% at 20% 20%, #7B2FFF22 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, #FF2D7822 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 60% 10%, #00F5FF11 0%, transparent 50%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgPulse {
    0% { opacity: 0.6; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 50px;
  }

  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -2px;
    line-height: 1;
    animation: titleGlow 3s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 20px #FF2D7866);
  }

  @keyframes titleGlow {
    0% { filter: drop-shadow(0 0 15px #FF2D7866); }
    100% { filter: drop-shadow(0 0 35px #7B2FFF99); }
  }

  .subtitle {
    font-size: 1rem;
    color: #ffffff88;
    margin-top: 8px;
    letter-spacing: 2px;
    font-weight: 300;
  }

  .dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 15px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: dotBounce 1.4s ease-in-out infinite;
  }
  .dot:nth-child(1) { background: var(--pink); animation-delay: 0s; }
  .dot:nth-child(2) { background: var(--purple); animation-delay: 0.2s; }
  .dot:nth-child(3) { background: var(--cyan); animation-delay: 0.4s; }

  @keyframes dotBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Input Section */
  .input-card {
    background: var(--card);
    border: 1px solid #ffffff11;
    border-radius: 24px;
    padding: 35px;
    margin-bottom: 30px;
    position: relative;
    overflow: hidden;
  }

  .input-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--pink), var(--purple), var(--cyan));
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .input-label {
    font-size: 0.85rem;
    color: var(--cyan);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 700;
  }

  .song-input {
    width: 100%;
    background: #ffffff08;
    border: 1.5px solid #ffffff15;
    border-radius: 14px;
    padding: 18px 22px;
    font-size: 1.1rem;
    color: white;
    font-family: 'Noto Kufi Arabic', sans-serif;
    outline: none;
    transition: all 0.3s;
    direction: rtl;
    resize: none;
    min-height: 80px;
  }

  .song-input:focus {
    border-color: var(--pink);
    box-shadow: var(--glow-pink);
    background: #ffffff10;
  }

  .song-input::placeholder { color: #ffffff33; }

  .style-pills {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
    margin-bottom: 24px;
  }

  .pill {
    padding: 8px 18px;
    border-radius: 50px;
    border: 1.5px solid #ffffff20;
    background: transparent;
    color: #ffffff88;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Noto Kufi Arabic', sans-serif;
  }

  .pill:hover, .pill.active {
    border-color: var(--pink);
    color: white;
    background: #FF2D7820;
    box-shadow: 0 0 12px #FF2D7844;
  }

  .generate-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 1.15rem;
    font-weight: 700;
    font-family: 'Noto Kufi Arabic', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    letter-spacing: 1px;
  }

  .generate-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--purple), var(--cyan));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .generate-btn:hover::before { opacity: 1; }
  .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px #FF2D7855; }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn span { position: relative; z-index: 1; }

  .generate-btn.loading {
    pointer-events: none;
    opacity: 0.8;
  }

  /* Result Section */
  .result-section {
    display: none;
    animation: fadeUp 0.6s ease forwards;
  }

  .result-section.show { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Dance Card */
  .dance-card {
    background: var(--card);
    border: 1px solid #ffffff11;
    border-radius: 24px;
    padding: 35px;
    margin-bottom: 25px;
    position: relative;
  }

  .section-title {
    font-size: 0.8rem;
    color: var(--pink);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, #FF2D7844, transparent);
  }

  /* Moves Timeline */
  .moves-timeline {
    position: relative;
  }

  .move-item {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    animation: slideIn 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .move-number {
    width: 42px;
    height: 42px;
    min-width: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.1rem;
  }

  .move-content { flex: 1; }

  .move-name {
    font-size: 1rem;
    font-weight: 700;
    color: white;
    margin-bottom: 4px;
  }

  .move-desc {
    font-size: 0.85rem;
    color: #ffffff66;
    line-height: 1.7;
  }

  .move-timing {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    border-radius: 20px;
    background: #00F5FF11;
    border: 1px solid #00F5FF33;
    color: var(--cyan);
    font-size: 0.75rem;
  }

  /* Video Section */
  .video-card {
    background: var(--card);
    border: 1px solid #ffffff11;
    border-radius: 24px;
    padding: 35px;
    margin-bottom: 25px;
  }

  .video-placeholder {
    background: #ffffff05;
    border: 2px dashed #ffffff15;
    border-radius: 18px;
    aspect-ratio: 16/9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .video-placeholder:hover {
    border-color: var(--purple);
    background: #7B2FFF08;
  }

  .video-placeholder.has-url {
    border-style: solid;
    border-color: var(--purple);
  }

  .play-icon {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    box-shadow: 0 0 30px #7B2FFF66;
    animation: pulsate 2s ease-in-out infinite;
  }

  @keyframes pulsate {
    0%, 100% { box-shadow: 0 0 20px #7B2FFF66; transform: scale(1); }
    50% { box-shadow: 0 0 40px #FF2D7888; transform: scale(1.05); }
  }

  .video-label { color: #ffffff55; font-size: 0.9rem; }

  .video-search-links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
  }

  .video-link-btn {
    padding: 14px;
    border-radius: 12px;
    border: 1.5px solid #ffffff15;
    background: #ffffff05;
    color: white;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .video-link-btn:hover {
    border-color: var(--pink);
    background: #FF2D7815;
    transform: translateY(-2px);
  }

  /* Video embed area */
  .video-embed {
    display: none;
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    aspect-ratio: 16/9;
  }
  .video-embed.show { display: block; }
  .video-embed iframe { width: 100%; height: 100%; border: none; }

  /* URL input */
  .url-input-row {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }

  .url-input {
    flex: 1;
    background: #ffffff08;
    border: 1.5px solid #ffffff15;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.85rem;
    color: white;
    font-family: 'Noto Kufi Arabic', sans-serif;
    outline: none;
    transition: all 0.3s;
    direction: ltr;
  }

  .url-input:focus { border-color: var(--purple); box-shadow: 0 0 15px #7B2FFF44; }
  .url-input::placeholder { color: #ffffff33; }

  .url-btn {
    padding: 12px 20px;
    background: linear-gradient(135deg, var(--purple), var(--cyan));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .url-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 15px #7B2FFF55; }

  /* Tips Section */
  .tips-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }

  .tip-card {
    background: #ffffff05;
    border: 1px solid #ffffff10;
    border-radius: 14px;
    padding: 18px;
    transition: all 0.25s;
  }

  .tip-card:hover { background: #ffffff08; border-color: #ffffff20; }

  .tip-emoji { font-size: 1.5rem; margin-bottom: 8px; }
  .tip-title { font-size: 0.85rem; font-weight: 700; color: white; margin-bottom: 4px; }
  .tip-text { font-size: 0.78rem; color: #ffffff55; line-height: 1.6; }

  /* Loading animation */
  .loader {
    display: none;
    text-align: center;
    padding: 50px;
  }
  .loader.show { display: block; }

  .dancer {
    font-size: 3rem;
    animation: dance 0.5s ease-in-out infinite alternate;
    display: inline-block;
  }

  @keyframes dance {
    from { transform: rotate(-15deg) translateY(-5px); }
    to { transform: rotate(15deg) translateY(5px); }
  }

  .loading-text {
    color: #ffffff66;
    margin-top: 15px;
    font-size: 0.9rem;
    letter-spacing: 1px;
  }

  /* Song info header */
  .song-info-header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px;
    background: linear-gradient(135deg, #FF2D7815, #7B2FFF15);
    border-radius: 16px;
    margin-bottom: 30px;
    border: 1px solid #FF2D7822;
  }

  .song-album-art {
    width: 65px; height: 65px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
    animation: spin 8s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .song-meta h3 { font-size: 1.1rem; font-weight: 700; }
  .song-meta p { font-size: 0.8rem; color: #ffffff55; margin-top: 4px; }

  /* Responsive */
  @media (max-width: 600px) {
    .tips-grid { grid-template-columns: 1fr; }
    .video-search-links { grid-template-columns: 1fr; }
    .input-card, .dance-card, .video-card { padding: 22px; }
    .style-pills { gap: 8px; }
    .pill { font-size: 0.75rem; padding: 6px 14px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">K-DANCE</div>
    <p class="subtitle">✨ مولّد رقصات الكيبوب بالذكاء الاصطناعي ✨</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </header>

  <!-- Input Card -->
  <div class="input-card">
    <div class="input-label">🎵 أدخل اسم الأغنية</div>
    <textarea class="song-input" id="songInput" placeholder="مثال: Dynamite - BTS، أو أي أغنية كيبوب..."></textarea>

    <div class="style-pills" id="stylePills">
      <div class="pill active" data-style="kpop">K-Pop</div>
      <div class="pill" data-style="hiphop">Hip-Hop</div>
      <div class="pill" data-style="cute">Cute / Idol</div>
      <div class="pill" data-style="powerful">Powerful</div>
      <div class="pill" data-style="girly">Girl Group</div>
      <div class="pill" data-style="boy">Boy Group</div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateDance()">
      <span>💃 ولّد الرقصة الآن</span>
    </button>
  </div>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="dancer">🕺</div>
    <div class="loading-text">جاري تحليل الأغنية وتصميم الرقصة...</div>
  </div>

  <!-- Result Section -->
  <div class="result-section" id="resultSection">

    <!-- Song Info Header -->
    <div class="song-info-header">
      <div class="song-album-art">🎶</div>
      <div class="song-meta">
        <h3 id="songTitle">-</h3>
        <p id="songGenre">-</p>
      </div>
    </div>

    <!-- Dance Moves Card -->
    <div class="dance-card">
      <div class="section-title">💃 خطوات الرقصة</div>
      <div class="moves-timeline" id="movesTimeline"></div>
    </div>

    <!-- Tips Card -->
    <div class="dance-card">
      <div class="section-title">⚡ نصائح الأداء</div>
      <div class="tips-grid" id="tipsGrid"></div>
    </div>

    <!-- Video Section -->
    <div class="video-card">
      <div class="section-title">🎬 فيديو تعلم الرقصة</div>

      <!-- Embed Area -->
      <div class="video-embed" id="videoEmbed">
        <iframe id="videoFrame" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      </div>

      <!-- Placeholder -->
      <div class="video-placeholder" id="videoPlaceholder">
        <div class="play-icon">▶</div>
        <div class="video-label">ابحث عن فيديو التعليم أدناه أو الصق رابط يوتيوب</div>
      </div>

      <!-- URL Input -->
      <div class="url-input-row">
        <input class="url-input" id="urlInput" type="text" placeholder="الصق رابط يوتيوب هنا...">
        <button class="url-btn" onclick="embedVideo()">تشغيل ▶</button>
      </div>

      <!-- Search Links -->
      <div class="video-search-links" id="searchLinks"></div>
    </div>

  </div>

</div>

<script>
  let selectedStyle = 'kpop';

  // Pill selection
  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedStyle = pill.dataset.style;
    });
  });

  async function generateDance() {
    const song = document.getElementById('songInput').value.trim();
    if (!song) {
      document.getElementById('songInput').style.borderColor = '#FF2D78';
      document.getElementById('songInput').placeholder = '⚠️ أدخل اسم الأغنية أولاً!';
      setTimeout(() => {
        document.getElementById('songInput').style.borderColor = '';
        document.getElementById('songInput').placeholder = 'مثال: Dynamite - BTS، أو أي أغنية كيبوب...';
      }, 2000);
      return;
    }

    // Show loader
    const btn = document.getElementById('generateBtn');
    btn.classList.add('loading');
    btn.querySelector('span').textContent = '⏳ جاري التوليد...';
    document.getElementById('loader').classList.add('show');
    document.getElementById('resultSection').classList.remove('show');

    const styleMap = {
      kpop: 'K-Pop عام',
      hiphop: 'هيب هوب',
      cute: 'Cute Idol أيدول لطيف',
      powerful: 'Powerful قوي',
      girly: 'Girl Group مجموعة بنات',
      boy: 'Boy Group مجموعة شباب'
    };

    const prompt = `أنت خبير رقصات كيبوب. المستخدم يريد رقصة للأغنية: "${song}"
أسلوب الرقصة المطلوب: ${styleMap[selectedStyle] || 'K-Pop'}.

أرجع JSON فقط بدون أي نص إضافي أو markdown بالشكل التالي:
{
  "songTitle": "اسم الأغنية والفنان",
  "genre": "وصف الإيقاع والأسلوب",
  "moves": [
    {
      "name": "اسم الحركة بالعربي",
      "description": "وصف دقيق لكيفية تنفيذ الحركة بالعربي",
      "timing": "وقت التنفيذ مثلاً: البيت الأول، المقطع، الكورس"
    }
  ],
  "tips": [
    { "emoji": "🎯", "title": "عنوان النصيحة", "text": "شرح النصيحة" }
  ],
  "youtubeSearch": "search query in English for YouTube dance tutorial of this song"
}

اجعل الحركات 6-8 حركات مفصلة وواقعية تناسب الأغنية. النصائح 4 نصائح مفيدة.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content.map(i => i.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const result = JSON.parse(clean);

      renderResult(result, song);

    } catch (err) {
      console.error(err);
      // Fallback demo
      renderResult(getDemoResult(song), song);
    } finally {
      document.getElementById('loader').classList.remove('show');
      btn.classList.remove('loading');
      btn.querySelector('span').textContent = '💃 ولّد الرقصة الآن';
    }
  }

  function getDemoResult(song) {
    return {
      songTitle: song,
      genre: "K-Pop إيقاع نابض وحيوي",
      moves: [
        { name: "البداية الهادئة", description: "ابدأ بالوقوف بشكل مستقيم، ذراعانك على الجانبين. حرك رأسك ببطء يميناً ويساراً مع الإيقاع.", timing: "المقدمة" },
        { name: "موجة الجسم", description: "ابدأ الموجة من الرأس تنزل للكتفين ثم الخصر والركبتين، كأن موجة تمر من خلالك.", timing: "البيت الأول" },
        { name: "خطوة الكيبوب", description: "قدم اليمين خطوة جانبية، اجلب اليسار بجانبها، كرر للجهة الأخرى مع تحريك الذراعين بزاوية 45 درجة.", timing: "الكورس" },
        { name: "تقاطع الذراعين", description: "قاطع ذراعيك أمام الصدر بشكل سريع، ثم افتحهما للخارج مع نشرة الصدر للأمام.", timing: "الكورس" },
        { name: "الدوران النصفي", description: "دور على قدمك اليسرى 180 درجة مع رفع قدمك اليمنى للخلف، أنزل بسلاسة.", timing: "الجسر" },
        { name: "الإشارة الإيقاعية", description: "وجّه إصبع السبابة للأمام مع ثني الركبتين قليلاً، بدّل بين اليد اليمنى واليسرى مع كل ضربة.", timing: "المقطع الأخير" }
      ],
      tips: [
        { emoji: "🎯", title: "ابدأ ببطء", text: "تدرب على كل حركة بنصف السرعة قبل الجمع مع الموسيقى" },
        { emoji: "💪", title: "حدة الحركات", text: "حركات الكيبوب تحتاج حدة وقوة، لا تكن ناعماً جداً" },
        { emoji: "👀", title: "التعبير الوجهي", text: "الرقصة تشمل الوجه! ابتسم وعبّر حسب مزاج الأغنية" },
        { emoji: "🔄", title: "التكرار مفتاح", text: "كرر كل حركة 10 مرات على الأقل حتى تصبح طبيعية" }
      ],
      youtubeSearch: `${song} kpop dance tutorial mirror`
    };
  }

  function renderResult(data, originalInput) {
    // Song info
    document.getElementById('songTitle').textContent = data.songTitle || originalInput;
    document.getElementById('songGenre').textContent = data.genre || '';

    // Moves
    const timeline = document.getElementById('movesTimeline');
    timeline.innerHTML = '';
    (data.moves || []).forEach((move, i) => {
      const div = document.createElement('div');
      div.className = 'move-item';
      div.style.animationDelay = `${i * 0.1}s`;
      div.innerHTML = `
        <div class="move-number">${i + 1}</div>
        <div class="move-content">
          <div class="move-name">${move.name}</div>
          <div class="move-desc">${move.description}</div>
          <span class="move-timing">⏱ ${move.timing}</span>
        </div>
      `;
      timeline.appendChild(div);
    });

    // Tips
    const tipsGrid = document.getElementById('tipsGrid');
    tipsGrid.innerHTML = '';
    (data.tips || []).forEach(tip => {
      const div = document.createElement('div');
      div.className = 'tip-card';
      div.innerHTML = `
        <div class="tip-emoji">${tip.emoji}</div>
        <div class="tip-title">${tip.title}</div>
        <div class="tip-text">${tip.text}</div>
      `;
      tipsGrid.appendChild(div);
    });

    // Search links
    const searchQuery = data.youtubeSearch || `${originalInput} kpop dance tutorial`;
    const encoded = encodeURIComponent(searchQuery);
    const encodedMirror = encodeURIComponent(searchQuery + ' mirror slow');

    document.getElementById('searchLinks').innerHTML = `
      <a class="video-link-btn" href="https://www.youtube.com/results?search_query=${encoded}" target="_blank">
        <span>▶</span> يوتيوب - تعليم الرقصة
      </a>
      <a class="video-link-btn" href="https://www.youtube.com/results?search_query=${encodedMirror}" target="_blank">
        <span>🔄</span> نسخة مرآة ببطء
      </a>
    `;

    // Show section
    document.getElementById('resultSection').classList.add('show');
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function embedVideo() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;

    let videoId = '';
    const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
    if (ytMatch) videoId = ytMatch[1];

    if (videoId) {
      document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
      document.getElementById('videoEmbed').classList.add('show');
      document.getElementById('videoPlaceholder').style.display = 'none';
    } else {
      document.getElementById('urlInput').style.borderColor = '#FF2D78';
      setTimeout(() => document.getElementById('urlInput').style.borderColor = '', 2000);
    }
  }

  // Enter key support
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') embedVideo();
  });

  document.getElementById('songInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      generateDance();
    }
  });
</script>
</body>
</html>
